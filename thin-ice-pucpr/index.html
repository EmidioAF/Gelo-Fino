<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gelo Fino · PUCPR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #040d1e;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Nunito', sans-serif;
    }
    canvas {
      display: block;
      border: 2px solid #1e3a6e;
      border-radius: 8px;
      box-shadow: 0 0 40px rgba(100,180,255,0.15);
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <!-- p5.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
  <!-- Ordem de carregamento importa: utilitários primeiro, main por último -->
  <script src="src/utils.js"></script>
  <script src="src/audio.js"></script>
  <script src="src/data-levels.js"></script>
  <script src="src/tile.js"></script>
  <script src="src/player.js"></script>
  <script src="src/level.js"></script>
  <script src="src/hud.js"></script>
  <script src="src/scenes.js"></script>
  <script src="src/game.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
